<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Choose language / Kies taal</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f7f7;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 28px;
      max-width: 460px;
      width: calc(100% - 32px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1.5rem;
    }
    p {
      color: #555;
      margin-bottom: 22px;
      line-height: 1.4;
    }
    .buttons {
      display: grid;
      gap: 12px;
    }
    a.button {
      display: block;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #d0d0d0;
      background: #fff;
      color: #222;
    }
    a.button:hover {
      background: #f0f4ff;
      border-color: #2f6fed;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Choose language / Kies taal</h1>
    <p>
      Open the encounter coding app in English or Dutch.<br>
      Open de ontmoetingen-app in het Engels of Nederlands.
    </p>
    <div class="buttons">
      <a class="button" href="appEngl.html">English version</a>
      <a class="button" href="appNL.html">Nederlandse versie</a>
    </div>
  </div>
</body>
</html>
